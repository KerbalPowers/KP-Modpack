	%MODULE[ModuleSonar]
	@radarDetectionCurve
	{
		key = 0 0 0.002030001 0.002625001
		key = 5 0 0.00161 0.003115
		key = 10 50 10 10
		key = 20 200 15 15
		key = 40 450 0 0
		//acousticSig is 1/10th engine thrust + 1/10th baseRCS * (vessel speed * (vesselspeed / 15))
	}
