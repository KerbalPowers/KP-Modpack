		{
			name = LiquidFuel
			resourceFlowMode = STAGE_STACK_FLOW_BALANCE
			ratio = 1
			DrawGauge = True
		}
		atmosphereCurve
		{
			key = 0 18000 0 0
		}
		// Jet params
		atmChangeFlow = True
		useVelCurve = True
		useAtmCurve = True
		flameoutBar = 0.02
		machLimit = 1
		machHeatMult = 40
		velCurve
		{
			key = 0 1.5 -0.1543096 -0.1543096
			key = 0.61 1.3 0 0
			key = 0.8 1 0 0
			key = 1 0.2 0 0
			key = 1.6 0 0 0
		}
		atmCurve
		{
			key = 0.03681628 0.04795167 2.854039 0.8369334
			key = 0.08672491 0.5301446 6.640914 6.782105
			key = 0.2237096 0.87207 0.8609211 0.5233155
			key = 1 1 0.000541224 0
		}
	}
	RESOURCE
	{
		name = IntakeAir
		amount = 3.4
		maxAmount = 3.4
	}
	MODULE
	{
		name = ModuleAnimateHeat
		ThermalAnim = cf34heat
	}
	MODULE
	{
		name = ModuleAnimateGeneric
		animationName = cf34reverse
		startEventGUIName = Reverse Thrust
		endEventGUIName = Forward Thrust
		actionGUIName = Toggle Thrust Reverser
		layer = 1
	}
	MODULE
	{
		name = FXModuleAnimateThrottle
		animationName = cf34spin
		responseSpeed = 0.05
		layer = 2
		dependOnEngineState = True
		dependOnThrottle = True
		weightOnOperational = True
		affectTime = false
		baseAnimSpeed = 0.01		// base + (throttle setting * multiplier)
		baseAnimSpeedMult = 100
		playInEditor = False
		animWrapMode = 2  	//	Default = 0	Once = 1		Clamp = 1	Loop = 2		PingPong = 4	ClampForever = 8
	}
	MODULE
	{
		name = ModuleAlternator
		RESOURCE
		{
			name = ElectricCharge
			rate = 3
		}
	}
	MODULE
	{
		name = ModuleSurfaceFX
