PART
{
	name = turboFanSize1.5
	module = Part
	author = blackheart612
	MODEL
	{
		model = AirplanePlus/Parts/Engine/Modern/CF34/model
	}
	rescaleFactor = 1
	//node_stack_top = 0.0, 2.79765, 0.56691, 0.0, 1.0, 0.0, 2
