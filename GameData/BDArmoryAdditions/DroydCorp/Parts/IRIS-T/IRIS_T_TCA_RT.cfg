PART
{
	// Kerbal Space Program - Part Config
	// 
	// 

	// --- general parameters ---
	name = fjrt-iris-tslm
	module = Part
	author = Android, Stardust

	// --- asset parameters ---
	//mesh = 
	rescaleFactor = 1
    
    MODEL
    {
        model = BDArmoryAdditions/DroydCorp/Parts/IRIS-T/IRIS_T_TCA
        texture = BDArmoryAdditions/DroydCorp/Parts/IRIS-T/tca_missiles_03_tex_atlas
        // scale = 0.84, 0.84, 1.0
    }


	// --- node definitions ---
	//node_attach = 0.0, 0.09, 0, 0, 1, 0, 0
	//node_stack_top = 0.0, 0.09, 0, 0, 1, 0, 0
    NODE
    {
    name = node0
    transform = node0
    size = 0
    method = FIXED_JOINT //FIXED_JOINT, HINGE_JOINT, LOCKED_JOINT, MERGED_PHYSICS or NO_PHYSICS
    }

	// --- editor parameters ---
	TechRequired = precisionEngineering
	entryCost = 2100
	cost = 1750
	category = none
	bdacategory = Missiles
	subcategory = 0
	title = IRIS-T 
	manufacturer = Titan Dynamics
	description = Maneuverable air-to-air infrared-seeking missile with advanced tracking and IRCCM. Also has the ability to intercept other missiles
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,1,0,0,1

	// --- standard part parameters ---
	mass = 0.0679
	dragModelType = default
	maximum_drag = 0.01
	minimum_drag = 0.01
	angularDrag = 2
	crashTolerance = 5
	maxTemp = 3600

    MODULE
    {
        name = MissileLauncher

        shortName = IRIS-T             //Missile name in BDA Weapon Manager

        // LAUNCHING PARAMETERS
        thrust = 20                     //KN thrust during boost phase
        cruiseThrust = 18               //thrust during cruise phase
        dropTime = 0.0                  //how many seconds after release until engine ignites
        boostTime = 1                 //seconds of boost phase
        cruiseTime = 15                 //seconds of cruise phase
        guidanceActive = true           //missile has guidanceActive
        maxTurnRateDPS = 25             //thrust+maxTurnRateDPS is the value used by the AI to prioritize missiles over each other. maxTurnRateDPS, in degrees per second, ONLY affects flight of RCS missiles like the HEKV1
        decoupleSpeed = 10
        decoupleForward = true
        
        // ENGAGE PARAMETERS
        minStaticLaunchRange = 0        // minimum launch range in meters assuming craft don't move, final min launch distance is dynamically calculated based on target/launching craft speeds
        maxStaticLaunchRange = 17000    // maximum launch range in meters assuming craft don't move, final max launch distance is dynamically calculated based on target/launching craft speeds

        engageAir = true
        engageMissile = true
        engageGround = false
        engageSLW = false
        
        // DetonationDistance = 10
        DetonateAtMinimumDistance = True
        
        // EFFECTS
        audioClipPath = BDArmory/Sounds/rocketLoop
        exhaustPrefabPath = BDArmory/Models/exhaust/smallExhaust
        boostExhaustPrefabPath = BDArmory/Models/exhaust/mediumExhaust
        boostExhaustTransformName = exhaustTransform
        boostTransformName = boostTransform
        
        // FLIGHT PARAMETERS
        optimumAirspeed = 900           //deals with how missile leads the target and calculation of turn radius for dynamic launch zone calculation, should match the max speed of your missile

        aero = true                     //Missile has aerodynamics
        liftArea = 0.0022                //increases lift which helps with manuevering and turning, but also increases drag
        steerMult = 15                  //big number = steer harder...
        maxTorque = 60                  //ammount of torque that will be applied to the missile for turning
        maxAoA = 30                     //max AoA missile can turn at, will limit missile's turn radius below what is possible with maxTorque if set too low
        aeroSteerDamping = 8
        torqueRampUp = 60
        
        // SEEKER PARAMETERS
        missileType = missile
        homingType = aam                //air to air missile different types are AAM, AGM, Cruise, Ballistic, ProNav, and AugProNav
        targetingType = heat
        heatThreshold = 12             // Distance-adjusted heat of target in order to be detected by missile, lower value results in better detection range
        maxOffBoresight = 300           //maximum angle, from the boresight, that the missile can track the target. This also controls how the missile can launch off boresight. When launched from the air at another air target with uncagedLock = false, launch off boresight is at 0.35*maxOffBoresight, otherwise it is at 0.75*,maxOffBoresight (uncagedLock = true OR either launching craft or target is landed/splashed).
		uncagedLock = true              // true: Allows missile to be cued to a radar target, also controls launch conditions, see above
        lockedSensorFOV = 40             // How much the seeker can see in the direction it is looking (in terms of angle cone).
        
       lockedSensorFOVBias
		{
			key = 0 	1.00 		// Highest weighing on centerline
			key = 0.5 	0.95 	
			key = 1 	0.90 
			key = 1.5 	0.85 
			key = 2 	0.80 
			key = 2.5 	0.75 
			key = 3 	0.70 		// 30% lower weighting at edge of sensor FOV
			key = 10	0.00		// Beyond Sidewinder FOV, provided for example purposes for large sensor FOV missiles
		}
		lockedSensorVelocityBias
		{
			key = 0 	1			// Highest weighing for target/flare travelling in same direction as tracked target
			key = 20 	0.75
			key = 45 	0.3
			key = 90	0.0			// ignore flares travelling perpendicular to target or in opposite direction
		}
    }

	MODULE
	{
		name = BDExplosivePart
		tntMass = 6.6
	}
    MODULE
    {
        name = ModuleGimbal
        gimbalTransformName = SeekerGimbal
        gimbalRange = 60
        useGimbalResponseSpeed = true
        gimbalResponseSpeed = 10
    }
}
